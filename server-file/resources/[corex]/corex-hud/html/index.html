<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COREX HUD</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="hud-container" class="hud-container hidden">
        <div class="hud-frame" id="hud-frame">
            <div class="hud-shell" id="hud-shell">
                <div class="hud-content" id="hud-content">
                    <div class="hud-row health-row" id="health-bar-container">
                        <span class="health-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24">
                                <path d="M9 3H15V9H21V15H15V21H9V15H3V9H9Z" />
                            </svg>
                        </span>

                        <span class="health-value" id="health-value">100</span>

                        <div class="health-stack">
                            <div class="hud-row ammo-row" id="ammo-row">
                                <span class="weapon-cluster hidden" id="weapon-cluster">
                                    <span class="ammo-count" id="ammo-count">0</span>
                                    <span class="weapon-silhouette" id="weapon-silhouette" aria-hidden="true">
                                        <img id="weapon-image" class="weapon-image hidden" alt="">
                                        <svg id="weapon-fallback" viewBox="0 0 120 48">
                                            <path d="M4 27H27L35 19H52L72 14H91L99 18H116V28H104L100 35H92L93 28H78L73 33H60V28H50L42 37H31L35 28H15L12 33H6Z" />
                                        </svg>
                                    </span>
                                </span>
                            </div>

                            <div class="vital-track health-track">
                                <div class="vital-ghost health-ghost" id="health-ghost"></div>
                                <div class="vital-fill health-fill" id="health-bar-fill"></div>
                            </div>

                            <div class="armor-track-shell" id="armor-bar-container">
                                <div class="vital-track armor-track">
                                    <div class="vital-fill shield-fill" id="armor-bar-fill"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="hud-row status-row">
                        <div class="utility-row" id="utility-row">
                            <div class="utility-item utility-infection cooldown" id="utility-infection" title="Infection">
                                <div class="utility-icon">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M12 4V7M12 17V20M4 12H7M17 12H20M6.3 6.3L8.4 8.4M15.6 15.6L17.7 17.7M17.7 6.3L15.6 8.4M8.4 15.6L6.3 17.7M12 9A3 3 0 1 0 12 15A3 3 0 1 0 12 9Z" />
                                    </svg>
                                </div>
                                <span class="utility-count" id="utility-infection-count">0</span>
                            </div>

                            <div class="utility-item utility-poison cooldown" id="utility-poison" title="Poison">
                                <div class="utility-icon">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M10 3H14M11 3V8L7.5 14.2A4 4 0 0 0 11 20H13A4 4 0 0 0 16.5 14.2L13 8V3M9 14H15" />
                                    </svg>
                                </div>
                                <span class="utility-count" id="utility-poison-count">0</span>
                            </div>

                            <div class="utility-item utility-bleeding cooldown" id="utility-bleeding" title="Bleeding">
                                <div class="utility-icon">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M12 3C12 3 7 9 7 13A5 5 0 0 0 17 13C17 9 12 3 12 3Z" />
                                    </svg>
                                </div>
                                <span class="utility-count" id="utility-bleeding-count">0</span>
                            </div>

                            <div class="utility-item utility-sick cooldown" id="utility-sick" title="Sick">
                                <div class="utility-icon">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M12 5L19 18H5ZM12 10V13M12 15.7V15.8" />
                                    </svg>
                                </div>
                                <span class="utility-count" id="utility-sick-count">0</span>
                            </div>

                            <div class="utility-item utility-cold cooldown" id="utility-cold" title="Cold">
                                <div class="utility-icon">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M12 2V22M4.93 6L19.07 18M4.93 18L19.07 6M12 2L9.8 4.2M12 2L14.2 4.2M12 22L9.8 19.8M12 22L14.2 19.8M4.93 6L7.96 6.56M4.93 6L5.5 9.04M19.07 18L16.04 17.44M19.07 18L18.5 14.96M4.93 18L7.96 17.44M4.93 18L5.5 14.96M19.07 6L16.04 6.56M19.07 6L18.5 9.04" />
                                    </svg>
                                </div>
                                <span class="utility-count" id="utility-cold-count">0</span>
                            </div>

                            <div class="utility-item utility-hunger" id="utility-hunger" title="Hunger">
                                <div class="utility-icon">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M7 3V10M9 3V10M7 6H9M8 10V21M15 3V10C15 12 16.5 13 18 13V21" />
                                    </svg>
                                </div>
                                <span class="utility-level">
                                    <span class="utility-level-fill" id="utility-hunger-level"></span>
                                </span>
                            </div>

                            <div class="utility-item utility-thirst" id="utility-thirst" title="Thirst">
                                <div class="utility-icon">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M12 3C12 3 7 9 7 13A5 5 0 0 0 17 13C17 9 12 3 12 3Z" />
                                    </svg>
                                </div>
                                <span class="utility-level">
                                    <span class="utility-level-fill" id="utility-thirst-level"></span>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
