<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corex Inventory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="vehicle-shop.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="ui-container hidden" id="inventory-container">

        <div class="inventory-row">
            <div class="inventory-panel player-panel">
                <div class="panel-header">
                    <div class="hex-icon">
                        <svg viewBox="0 0 100 100" class="hex-svg">
                            <polygon points="50,5 93,27 93,73 50,95 7,73 7,27" fill="none" stroke="currentColor"
                                stroke-width="3" />
                            <polygon points="50,25 72,38 72,62 50,75 28,62 28,38" fill="currentColor" opacity="0.4" />
                        </svg>
                        <i class="fa-solid fa-box-open hex-inner-icon"></i>
                    </div>
                    <span class="panel-title">Inventory</span>
                    <div class="header-spacer"></div>
                    <div class="weight-bar" id="weight-segments"></div>
                    <div class="weight-text">
                        <i class="fa-solid fa-weight-hanging"></i>
                        <span><span id="current-weight">0</span> / <span id="max-weight">2500</span></span>
                    </div>
                </div>
                <div class="grid-container">
                    <div class="inventory-grid" id="player-grid"></div>
                </div>
            </div>

            <div class="inventory-panel drop-panel">
                <div class="panel-header">
                    <div class="hex-icon">
                        <svg viewBox="0 0 100 100" class="hex-svg">
                            <polygon points="50,5 93,27 93,73 50,95 7,73 7,27" fill="none" stroke="currentColor"
                                stroke-width="3" />
                            <polygon points="50,25 72,38 72,62 50,75 28,62 28,38" fill="currentColor" opacity="0.4" />
                        </svg>
                        <i class="fa-solid fa-arrow-down hex-inner-icon" id="drop-icon"></i>
                    </div>
                    <span class="panel-title" id="drop-title">Ground</span>
                    <div class="header-spacer"></div>
                    <div class="drop-hint" id="drop-hint">
                        <i class="fa-solid fa-hand-pointer"></i>
                        <span>Drop Items Here</span>
                    </div>
                    <div class="shop-money hidden" id="shop-money">
                        <i class="fa-solid fa-coins"></i>
                        <span id="player-money">$0</span>
                    </div>
                </div>
                <div class="grid-container">
                    <div class="inventory-grid drop-grid" id="drop-grid"></div>
                </div>
            </div>
        </div>

    </div>

    <div id="vehicle-shop-container" class="vehicle-shop-overlay hidden">
        <div class="page">
            <div class="catalog">
                <div class="catalog-header">
                    <div class="catalog-title">
                        <div>
                            <div class="subtitle" id="vehicle-shop-eyebrow">BASIC TRANSPORT</div>
                            <h1 id="vehicle-shop-title">Bike Rental</h1>
                        </div>
                    </div>

                    <div class="vehicle-shop-meta">
                        <div class="money-pill">
                            <i class="fa-solid fa-coins"></i>
                            <span id="vehicle-shop-money">$0</span>
                        </div>
                        <button id="vehicle-shop-close" class="close-btn" type="button" aria-label="Close">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                </div>

                <div class="topbar">
                    <div class="search">
                        <i class="fa-solid fa-magnifying-glass search-icon"></i>
                        <input id="vehicle-shop-search" type="text" placeholder="Search by name, type, or specification" />
                    </div>

                    <div class="tabs" id="vehicle-shop-tabs"></div>

                    <div class="sort" id="vehicle-shop-sort">
                        <button class="sort-btn" id="vehicle-shop-sort-btn" type="button">
                            <i class="fa-solid fa-arrow-down-wide-short"></i>
                            <span id="vehicle-shop-sort-label">Featured</span>
                            <i class="fa-solid fa-chevron-down"></i>
                        </button>
                        <div class="sort-menu" id="vehicle-shop-sort-menu">
                            <div class="sort-option selected" data-sort="featured">
                                <span>Featured</span>
                                <i class="fa-solid fa-check check"></i>
                            </div>
                            <div class="sort-option" data-sort="lowhigh">
                                <span>Price: low to high</span>
                                <i class="fa-solid fa-check check"></i>
                            </div>
                            <div class="sort-option" data-sort="highlow">
                                <span>Price: high to low</span>
                                <i class="fa-solid fa-check check"></i>
                            </div>
                        </div>
                    </div>

                    <div class="counter">
                        <span class="dot"></span>
                        <span class="current" id="vehicle-shop-count-current">00</span>
                        <span>/</span>
                        <span id="vehicle-shop-count-total">00</span>
                    </div>
                </div>

                <div class="grid" id="vehicle-shop-grid"></div>
            </div>
        </div>
    </div>

    <div id="hotbar-container" class="hotbar-container">
        <div class="hotbar-slot-wrapper">
            <div class="hotbar-slot" data-slot="1"></div>
            <div class="hotbar-key">1</div>
        </div>
        <div class="hotbar-slot-wrapper">
            <div class="hotbar-slot" data-slot="2"></div>
            <div class="hotbar-key">2</div>
        </div>
        <div class="hotbar-slot-wrapper">
            <div class="hotbar-slot" data-slot="3"></div>
            <div class="hotbar-key">3</div>
        </div>
        <div class="hotbar-slot-wrapper">
            <div class="hotbar-slot" data-slot="4"></div>
            <div class="hotbar-key">4</div>
        </div>
        <div class="hotbar-slot-wrapper">
            <div class="hotbar-slot" data-slot="5"></div>
            <div class="hotbar-key">5</div>
        </div>
        <div class="hotbar-slot-wrapper">
            <div class="hotbar-slot" data-slot="6"></div>
            <div class="hotbar-key">6</div>
        </div>
    </div>

    <div id="context-menu" class="hidden">
        <div class="menu-option" data-action="use">
            <i class="fa-solid fa-hand"></i>
            <span>Use</span>
        </div>
        <div class="menu-option" data-action="drop">
            <i class="fa-solid fa-trash-can"></i>
            <span>Drop</span>
        </div>
        <div class="menu-option has-submenu" data-action="give">
            <i class="fa-solid fa-gift"></i>
            <span>Give</span>
            <i class="fa-solid fa-chevron-right submenu-arrow"></i>
        </div>

        <div id="players-submenu" class="hidden">
            <div class="submenu-header">Select Player</div>
            <div id="players-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="vehicle-shop.js"></script>
</body>

</html>
